<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 740" width="800" height="740">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700"
        fill="#111" font-family="Arial">Single-Head Attention: The Complete Flow</text>

  <!-- LEFT COLUMN: Input and Projections -->
  <!-- Input X -->
  <rect x="25" y="70" width="200" height="60" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="125" y="95" text-anchor="middle" font-size="14" font-weight="700"
        fill="#0C447C" font-family="Arial">Input Embeddings X</text>
  <text x="125" y="117" text-anchor="middle" font-size="14" fill="#0C447C"
        font-family="Courier New">Shape: [3, d_model]</text>
  <text x="125" y="152" text-anchor="middle" font-size="14" fill="#444"
        font-family="Arial" font-style="italic">From Chapter 4</text>

  <!-- Arrows from X to Q, K, V -->
  <line x1="125" y1="132" x2="125" y2="198" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Q box -->
  <rect x="25" y="200" width="200" height="42" rx="5" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="125" y="226" text-anchor="middle" font-size="14" font-weight="700"
        fill="#0C447C" font-family="Arial">Q = X · W_Q</text>

  <line x1="125" y1="242" x2="125" y2="275" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- K box -->
  <rect x="25" y="277" width="200" height="42" rx="5" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="125" y="303" text-anchor="middle" font-size="14" font-weight="700"
        fill="#633806" font-family="Arial">K = X · W_K</text>

  <line x1="125" y1="319" x2="125" y2="352" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- V box -->
  <rect x="25" y="354" width="200" height="42" rx="5" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="125" y="380" text-anchor="middle" font-size="14" font-weight="700"
        fill="#3C3489" font-family="Arial">V = X · W_V</text>

  <text x="125" y="420" text-anchor="middle" font-size="14" fill="#444"
        font-family="Arial" font-style="italic">Projections (Ch 4)</text>

  <!-- CENTER COLUMN: Steps 1-4 -->
  <!-- Arrow Q,K -> Step 1 -->
  <line x1="225" y1="221" x2="305" y2="221" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="225" y1="298" x2="305" y2="240" stroke="#EF9F27" stroke-width="1.5"
        stroke-dasharray="5 3" marker-end="url(#arr)"/>

  <!-- Step 1 -->
  <rect x="310" y="200" width="210" height="60" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="415" y="225" text-anchor="middle" font-size="14" font-weight="700"
        fill="#633806" font-family="Arial">Step 1: Q · Kᵀ</text>
  <text x="415" y="247" text-anchor="middle" font-size="13" fill="#633806"
        font-family="Arial">Raw similarity scores [3×3]</text>

  <line x1="415" y1="260" x2="415" y2="292" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="310" y="295" width="210" height="60" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="415" y="320" text-anchor="middle" font-size="14" font-weight="700"
        fill="#633806" font-family="Arial">Step 2: ÷ √d_k</text>
  <text x="415" y="342" text-anchor="middle" font-size="13" fill="#633806"
        font-family="Arial">Prevent exploding scores</text>

  <line x1="415" y1="355" x2="415" y2="387" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="310" y="390" width="210" height="60" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="415" y="415" text-anchor="middle" font-size="14" font-weight="700"
        fill="#633806" font-family="Arial">Step 3: Causal Mask</text>
  <text x="415" y="437" text-anchor="middle" font-size="13" fill="#633806"
        font-family="Arial">Set future positions to -∞</text>

  <line x1="415" y1="450" x2="415" y2="482" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="310" y="485" width="210" height="60" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="415" y="510" text-anchor="middle" font-size="14" font-weight="700"
        fill="#085041" font-family="Arial">Step 4: Softmax</text>
  <text x="415" y="532" text-anchor="middle" font-size="13" fill="#085041"
        font-family="Arial">Scores → probabilities</text>

  <!-- RIGHT COLUMN: Step 5 and Output -->
  <!-- Arrow from Softmax to Step 5 -->
  <line x1="520" y1="515" x2="565" y2="515" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow from V to Step 5 (path goes left, down below all steps, then right — avoids crossing any box) -->
  <path d="M 125 396 L 125 600 L 575 600" fill="none"
        stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="575" y1="600" x2="575" y2="548" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="570" y="485" width="210" height="60" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2"/>
  <text x="675" y="510" text-anchor="middle" font-size="14" font-weight="700"
        fill="#085041" font-family="Arial">Step 5: Weights · V</text>
  <text x="675" y="532" text-anchor="middle" font-size="13" fill="#085041"
        font-family="Arial">Context-aware output</text>

  <!-- Arrow to Output -->
  <line x1="675" y1="585" x2="675" y2="620" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="570" y="622" width="210" height="42" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2"/>
  <text x="675" y="650" text-anchor="middle" font-size="14" font-weight="700"
        fill="#085041" font-family="Courier New">Output [3, d_k]</text>

  <!-- Formula at bottom -->
  <rect x="25" y="685" width="500" height="30" rx="4" fill="#F5F4F0" stroke="#D4D4D4"/>
  <text x="275" y="706" text-anchor="middle" font-size="13" font-weight="700"
        fill="#111" font-family="Courier New">softmax(Q·Kᵀ / √d_k) · V</text>
</svg>