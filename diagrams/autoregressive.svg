<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="#444444" stroke="#444444" stroke-width="1"/>
    </marker>
  </defs>
  <rect width="800" height="340" fill="white"/>
  <text x="410" y="28" text-anchor="middle" font-size="18" font-weight="700"
        fill="#111" font-family="Arial">Autoregressive Generation: One Token at a Time</text>

  <!-- Step 1: Prompt -->
  <rect x="15" y="55" width="160" height="65" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="95" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#0C2E6B"
        font-family="Arial">Step 1: Prompt</text>
  <text x="95" y="106" text-anchor="middle" font-size="14" fill="#0C2E6B"
        font-family="Courier New">"ROMEO:"</text>

  <!-- Arrow -->
  <line x1="175" y1="88" x2="207" y2="88" stroke="#444444" stroke-width="2.5" marker-end="url(#arr3)"/>

  <!-- Step 2: Forward -->
  <rect x="210" y="55" width="170" height="65" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="295" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#633806"
        font-family="Arial">Step 2: Forward Pass</text>
  <text x="295" y="106" text-anchor="middle" font-size="13" fill="#633806"
        font-family="Arial">→ 50,257 logits</text>

  <!-- Arrow -->
  <line x1="380" y1="88" x2="412" y2="88" stroke="#444444" stroke-width="2.5" marker-end="url(#arr3)"/>

  <!-- Step 3: Sample -->
  <rect x="415" y="55" width="180" height="65" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="505" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489"
        font-family="Arial">Step 3: Sample Token</text>
  <text x="505" y="106" text-anchor="middle" font-size="13" fill="#3C3489"
        font-family="Arial">temp → softmax → pick</text>

  <!-- Arrow -->
  <line x1="595" y1="88" x2="627" y2="88" stroke="#444444" stroke-width="2.5" marker-end="url(#arr3)"/>

  <!-- Step 4: Append -->
  <rect x="630" y="55" width="155" height="65" rx="8" fill="#D4EFE4" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="707" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#04342C"
        font-family="Arial">Step 4: Append</text>
  <text x="707" y="106" text-anchor="middle" font-size="13" fill="#04342C"
        font-family="Arial">tokens += [O]</text>

  <!-- Loop back arrow -->
  <path d="M 707 120 C 707 165 295 165 295 120" fill="none" stroke="#444444" stroke-width="1.8"
        stroke-dasharray="6 4" marker-end="url(#arr3)"/>

  <!-- Loop text BELOW the curve -->
  <text x="500" y="180" text-anchor="middle" font-size="14" fill="#444444" font-family="Arial"
        font-style="italic">Repeat for max_tokens iterations</text>

  <!-- Concrete example row -->
  <text x="30" y="210" font-size="15" font-weight="700" fill="#111" font-family="Arial">Concrete example:</text>

  <!-- Iteration boxes - bigger -->
  <rect x="20" y="220" width="145" height="40" rx="5" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="92" y="245" text-anchor="middle" font-size="12" fill="#0C2E6B" font-family="Courier New">Iter 0: [ROM,EO,:]</text>

  <text x="178" y="245" text-anchor="middle" font-size="16" fill="#444444" font-family="Arial">→</text>

  <rect x="190" y="220" width="160" height="40" rx="5" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="270" y="245" text-anchor="middle" font-size="12" fill="#0C2E6B" font-family="Courier New">Iter 1: [ROM,EO,:,O]</text>

  <text x="363" y="245" text-anchor="middle" font-size="16" fill="#444444" font-family="Arial">→</text>

  <rect x="375" y="220" width="175" height="40" rx="5" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="462" y="245" text-anchor="middle" font-size="12" fill="#0C2E6B" font-family="Courier New">Iter 2: [ROM,EO,:,O, ,]</text>

  <text x="560" y="245" text-anchor="start" font-size="14" fill="#444444" font-family="Arial">→</text>

  <rect x="585" y="220" width="195" height="40" rx="5" fill="#D4EFE4" stroke="#0F6E56" stroke-width="1"/>
  <text x="682" y="245" text-anchor="middle" font-size="12" fill="#04342C" font-family="Courier New">Final: "ROMEO: O..."</text>

  <!-- Bottom notes -->
  <text x="400" y="295" text-anchor="middle" font-size="13" fill="#444" font-family="Arial">Each iteration: full forward pass, but only the LAST position's logits are used.</text>
  <text x="400" y="318" text-anchor="middle" font-size="13" fill="#444" font-family="Arial">If sequence exceeds 128 tokens, oldest tokens are cropped (the model "forgets" them).</text>
</svg>