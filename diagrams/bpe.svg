<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 610" width="800" height="610">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700"
        fill="#111111" font-family="Arial">Byte Pair Encoding (BPE): Merging "aab aab ab"</text>

  <!-- Initial state -->
  <rect x="20" y="50" width="760" height="80" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="40" y="78" font-size="14" font-weight="700" fill="#0C447C" font-family="Arial">Initial Bytes (Vocabulary: 256 base bytes)</text>
  <text x="40" y="106" font-size="13" fill="#0C447C" font-family="Courier New">[97] [97] [98] [32] [97] [97] [98] [32] [97] [98]   (a=97, b=98, space=32)</text>

  <line x1="400" y1="135" x2="400" y2="165" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Merge 1: a+b -> 256 -->
  <rect x="20" y="170" width="760" height="100" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="40" y="195" font-size="14" font-weight="700" fill="#633806" font-family="Arial">Merge 1: Most frequent pair (a, b) appears 3 times</text>
  <text x="40" y="220" font-size="13" fill="#633806" font-family="Arial">New token 256 = "ab"     Vocabulary: 257 tokens</text>
  <text x="40" y="244" font-size="13" fill="#633806" font-family="Courier New">[97] [256] [32] [97] [256] [32] [256]     (7 tokens, was 10)</text>

  <line x1="400" y1="275" x2="400" y2="305" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Merge 2: a+256 -> 257 -->
  <rect x="20" y="310" width="760" height="100" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="40" y="335" font-size="14" font-weight="700" fill="#633806" font-family="Arial">Merge 2: Most frequent pair (a, 256) appears 2 times</text>
  <text x="40" y="360" font-size="13" fill="#633806" font-family="Arial">New token 257 = "aab"     Vocabulary: 258 tokens</text>
  <text x="40" y="384" font-size="13" fill="#633806" font-family="Courier New">[257] [32] [257] [32] [256]     (5 tokens, was 7)</text>

  <line x1="400" y1="415" x2="400" y2="445" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Merge 3: 257+space -> 258 -->
  <rect x="20" y="450" width="760" height="100" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="40" y="475" font-size="14" font-weight="700" fill="#085041" font-family="Arial">Merge 3: Most frequent pair (257, 32) appears 2 times</text>
  <text x="40" y="500" font-size="13" fill="#085041" font-family="Arial">New token 258 = "aab "     Vocabulary: 259 tokens</text>
  <text x="40" y="524" font-size="13" fill="#085041" font-family="Courier New">[258] [258] [256]     (3 tokens, was 5!)</text>

  <!-- Key point -->
  <rect x="20" y="565" width="760" height="32" rx="4" fill="#F5F4F0" stroke="#D4D4D4"/>
  <text x="400" y="586" text-anchor="middle" font-size="13" fill="#333333"
        font-family="Arial">10 bytes compressed to 3 tokens. BPE finds efficient encodings by repeated greedy merging.</text>
</svg>