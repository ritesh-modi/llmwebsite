<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700"
        fill="#111" font-family="Arial">LoRA: The Dual-Path Forward Pass</text>

  <!-- Input x -->
  <rect x="320" y="55" width="160" height="45" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
  <text x="400" y="83" text-anchor="middle" font-size="14" font-weight="700"
        fill="#0C2E6B" font-family="Arial">Input x (d=4096)</text>

  <!-- Path 1: split left (frozen base) via path -->
  <path d="M 400 100 L 400 125 L 200 125 L 200 170" fill="none"
        stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr2)"/>
  <!-- Path 2: split right (adapter) via path -->
  <path d="M 400 100 L 400 125 L 600 125 L 600 170" fill="none"
        stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Path 1: Frozen base -->
  <rect x="100" y="175" width="200" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
  <text x="200" y="200" text-anchor="middle" font-size="13" font-weight="700"
        fill="#0C2E6B" font-family="Arial">W0 (4096 x 4096)</text>
  <text x="200" y="220" text-anchor="middle" font-size="12" fill="#0C2E6B"
        font-family="Arial">FROZEN - no gradients</text>
  <text x="310" y="258" text-anchor="start" font-size="12" font-weight="600"
        fill="#0C2E6B" font-family="Arial">Path 1: Frozen highway</text>

  <!-- Path 2: Adapter bypass -->
  <!-- Matrix A -->
  <rect x="500" y="175" width="200" height="50" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="2"/>
  <text x="600" y="198" text-anchor="middle" font-size="13" font-weight="700"
        fill="#633806" font-family="Arial">A (r x 4096)</text>
  <text x="600" y="215" text-anchor="middle" font-size="12" fill="#633806"
        font-family="Arial">Compress: 4096 → r dims</text>

  <line x1="600" y1="225" x2="600" y2="260" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Matrix B -->
  <rect x="500" y="265" width="200" height="50" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="2"/>
  <text x="600" y="288" text-anchor="middle" font-size="13" font-weight="700"
        fill="#633806" font-family="Arial">B (4096 x r)</text>
  <text x="600" y="305" text-anchor="middle" font-size="12" fill="#633806"
        font-family="Arial">Expand: r → 4096 dims</text>

  <text x="600" y="340" text-anchor="middle" font-size="12" font-weight="600"
        fill="#633806" font-family="Arial">Path 2: Adapter detour (TRAINABLE)</text>

  <!-- Scale -->
  <rect x="530" y="355" width="140" height="30" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="600" y="375" text-anchor="middle" font-size="12" font-weight="600"
        fill="#633806" font-family="Arial">x scale (a/r)</text>

  <!-- Outputs merge via paths that end at the + circle -->
  <path d="M 200 235 L 200 420 L 382 420" fill="none"
        stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr2)"/>
  <path d="M 600 385 L 600 420 L 418 420" fill="none"
        stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Addition -->
  <circle cx="400" cy="420" r="18" fill="#D4EFE4" stroke="#0F6E56" stroke-width="2"/>
  <text x="400" y="426" text-anchor="middle" font-size="20" font-weight="700"
        fill="#04342C" font-family="Arial">+</text>

  <line x1="400" y1="438" x2="400" y2="478" stroke="#0F6E56" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Output -->
  <rect x="310" y="482" width="180" height="35" rx="8" fill="#D4EFE4" stroke="#0F6E56" stroke-width="2"/>
  <text x="400" y="505" text-anchor="middle" font-size="13" font-weight="700"
        fill="#04342C" font-family="Arial">h = W0x + (a/r)BAx</text>
</svg>