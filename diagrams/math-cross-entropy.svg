<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="700"
        fill="#111" font-family="Arial">How Cross-Entropy Loss Trains SQL Token Prediction</text>

  <!-- Input context -->
  <rect x="30" y="55" width="180" height="55" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="2"/>
  <text x="120" y="78" text-anchor="middle" font-size="14" font-weight="700"
        fill="#0C447C" font-family="Arial">Context: "### SQL:"</text>
  <text x="120" y="96" text-anchor="middle" font-size="14" fill="#0C447C"
        font-family="Arial">+ schema + question</text>

  <line x1="210" y1="82" x2="248" y2="82" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Model -->
  <rect x="255" y="55" width="150" height="55" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="2"/>
  <text x="330" y="78" text-anchor="middle" font-size="15" font-weight="700"
        fill="#3C3489" font-family="Arial">LLM Forward</text>
  <text x="330" y="96" text-anchor="middle" font-size="14" fill="#3C3489"
        font-family="Arial">Produce logits</text>

  <line x1="405" y1="82" x2="443" y2="82" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Logits -->
  <rect x="450" y="55" width="170" height="55" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="2"/>
  <text x="535" y="76" text-anchor="middle" font-size="14" font-weight="700"
        fill="#633806" font-family="Arial">Raw Logits</text>
  <text x="535" y="96" text-anchor="middle" font-size="14" fill="#633806"
        font-family="Arial">[3.2, 1.1, 0.5, ...]</text>

  <line x1="620" y1="82" x2="658" y2="82" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Softmax -->
  <rect x="665" y="55" width="120" height="55" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2"/>
  <text x="725" y="76" text-anchor="middle" font-size="14" font-weight="700"
        fill="#085041" font-family="Arial">Softmax</text>
  <text x="725" y="96" text-anchor="middle" font-size="14" fill="#085041"
        font-family="Arial">[0.76, 0.09, ...]</text>

  <!-- Arrow down to loss -->
  <line x1="725" y1="110" x2="725" y2="158" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Correct token -->
  <rect x="450" y="160" width="170" height="45" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="2"/>
  <text x="535" y="187" text-anchor="middle" font-size="14" font-weight="700"
        fill="#0C447C" font-family="Arial">Correct: SELECT</text>

  <line x1="620" y1="182" x2="658" y2="182" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Loss computation -->
  <rect x="665" y="160" width="120" height="55" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="2"/>
  <text x="725" y="182" text-anchor="middle" font-size="14" font-weight="700"
        fill="#633806" font-family="Arial">-log(0.76)</text>
  <text x="725" y="202" text-anchor="middle" font-size="14" fill="#633806"
        font-family="Arial">= 0.271</text>

  <!-- Arrow down to gradient -->
  <line x1="725" y1="215" x2="725" y2="258" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Gradient update -->
  <rect x="420" y="265" width="365" height="60" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="2"/>
  <text x="602" y="290" text-anchor="middle" font-size="14" font-weight="700"
        fill="#3C3489" font-family="Arial">Backpropagation: dL/dW</text>
  <text x="602" y="312" text-anchor="middle" font-size="14" fill="#3C3489"
        font-family="Arial">W_new = W_old - lr * gradient</text>

  <!-- Interpretation box -->
  <rect x="30" y="265" width="375" height="170" rx="8" fill="#F5F4F0" stroke="#D4D4D4"/>
  <text x="217" y="290" text-anchor="middle" font-size="15" font-weight="700"
        fill="#111" font-family="Arial">What This Means</text>
  <text x="217" y="315" text-anchor="middle" font-size="14" fill="#333"
        font-family="Arial">p(SELECT) = 0.76: the model</text>
  <text x="217" y="333" text-anchor="middle" font-size="14" fill="#333"
        font-family="Arial">was 76% sure of the right token.</text>
  <text x="217" y="360" text-anchor="middle" font-size="14" fill="#333"
        font-family="Arial">Loss = 0.271 (low = good).</text>
  <text x="217" y="378" text-anchor="middle" font-size="14" fill="#333"
        font-family="Arial">If p=0.05, loss = 2.996 (bad).</text>
  <text x="217" y="405" text-anchor="middle" font-size="14" fill="#333"
        font-family="Arial">Gradient nudges SELECT up.</text>
</svg>