<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 525" width="800" height="525">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700"
        fill="#111" font-family="Arial">Dot Product as Similarity: Three Cases</text>

  <!-- Case 1: Similar vectors (high dot product) -->
  <rect x="20" y="60" width="245" height="220" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="142" y="85" text-anchor="middle" font-size="14" font-weight="700"
        fill="#085041" font-family="Arial">Case 1: Similar Vectors</text>

  <!-- Axes -->
  <line x1="55" y1="215" x2="235" y2="215" stroke="#888" stroke-width="1"/>
  <line x1="55" y1="215" x2="55" y2="110" stroke="#888" stroke-width="1"/>

  <!-- Vector A (blue) -->
  <line x1="55" y1="215" x2="190" y2="125" stroke="#378ADD" stroke-width="3" marker-end="url(#arr2)"/>
  <text x="198" y="120" font-size="14" font-weight="700" fill="#0C447C" font-family="Arial">A</text>

  <!-- Vector B (amber) -->
  <line x1="55" y1="215" x2="210" y2="150" stroke="#EF9F27" stroke-width="3" marker-end="url(#arr2)"/>
  <text x="222" y="150" font-size="14" font-weight="700" fill="#633806" font-family="Arial">B</text>

  <text x="142" y="255" text-anchor="middle" font-size="14" font-weight="700"
        fill="#085041" font-family="Courier New">A · B = +large</text>

  <!-- Case 2: Orthogonal (zero dot product) -->
  <rect x="278" y="60" width="244" height="220" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="400" y="85" text-anchor="middle" font-size="14" font-weight="700"
        fill="#633806" font-family="Arial">Case 2: Unrelated Vectors</text>

  <line x1="313" y1="215" x2="495" y2="215" stroke="#888" stroke-width="1"/>
  <line x1="313" y1="215" x2="313" y2="110" stroke="#888" stroke-width="1"/>

  <line x1="313" y1="215" x2="460" y2="215" stroke="#378ADD" stroke-width="3" marker-end="url(#arr2)"/>
  <text x="472" y="213" font-size="14" font-weight="700" fill="#0C447C" font-family="Arial">A</text>

  <line x1="313" y1="215" x2="313" y2="120" stroke="#EF9F27" stroke-width="3" marker-end="url(#arr2)"/>
  <text x="325" y="116" font-size="14" font-weight="700" fill="#633806" font-family="Arial">B</text>

  <text x="400" y="255" text-anchor="middle" font-size="14" font-weight="700"
        fill="#633806" font-family="Courier New">A · B = 0</text>

  <!-- Case 3: Opposite (negative dot product) -->
  <rect x="535" y="60" width="245" height="220" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="657" y="85" text-anchor="middle" font-size="14" font-weight="700"
        fill="#3C3489" font-family="Arial">Case 3: Opposite Vectors</text>

  <line x1="570" y1="180" x2="750" y2="180" stroke="#888" stroke-width="1"/>
  <line x1="657" y1="230" x2="657" y2="110" stroke="#888" stroke-width="1"/>

  <line x1="657" y1="180" x2="740" y2="130" stroke="#378ADD" stroke-width="3" marker-end="url(#arr2)"/>
  <text x="748" y="122" font-size="14" font-weight="700" fill="#0C447C" font-family="Arial">A</text>

  <line x1="657" y1="180" x2="585" y2="215" stroke="#EF9F27" stroke-width="3" marker-end="url(#arr2)"/>
  <text x="572" y="225" font-size="14" font-weight="700" fill="#633806" font-family="Arial">B</text>

  <text x="657" y="255" text-anchor="middle" font-size="14" font-weight="700"
        fill="#3C3489" font-family="Courier New">A · B = -large</text>

  <!-- Summary box -->
  <rect x="20" y="300" width="760" height="100" rx="6" fill="#F5F4F0" stroke="#D4D4D4"/>
  <text x="400" y="325" text-anchor="middle" font-size="14" font-weight="700"
        fill="#111" font-family="Arial">The Dot Product Rule</text>
  <text x="400" y="350" text-anchor="middle" font-size="13" fill="#085041"
        font-family="Arial">Positive = same direction (similar). Zero = perpendicular. Negative = opposite.</text>
  <text x="400" y="373" text-anchor="middle" font-size="13" fill="#333"
        font-family="Arial">In attention: Q · K measures how relevant a Key is to a Query.</text>

  <!-- Concrete example -->
  <rect x="20" y="415" width="760" height="85" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="400" y="441" text-anchor="middle" font-size="14" font-weight="700"
        fill="#0C447C" font-family="Arial">Concrete Example: A = [1, 0, 3] and B = [2, 0, 4]</text>
  <text x="400" y="470" text-anchor="middle" font-size="13" fill="#0C447C"
        font-family="Courier New">A · B = (1×2)+(0×0)+(3×4) = 14  (positive → similar)</text>
</svg>