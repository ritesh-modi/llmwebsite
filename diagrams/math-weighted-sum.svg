<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 495" width="800" height="495">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700"
        fill="#111" font-family="Arial">The Weighted Sum: How "cat" Gathers Information</text>

  <text x="400" y="58" text-anchor="middle" font-size="14" fill="#333"
        font-family="Arial">"cat" attends to "The" (weight 0.453) and to itself (weight 0.547)</text>

  <!-- ===== Row 1: V("The") with weight ===== -->
  <rect x="25" y="90" width="190" height="65" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="120" y="115" text-anchor="middle" font-size="14" font-weight="700"
        fill="#0C447C" font-family="Arial">V("The") = [1.0, 0.0]</text>
  <text x="120" y="140" text-anchor="middle" font-size="14" fill="#0C447C"
        font-family="Arial">weight: 0.453</text>

  <!-- Arrow from V_The to computation -->
  <line x1="215" y1="122" x2="255" y2="122" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Weighted result for "The" -->
  <rect x="260" y="92" width="260" height="60" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="390" y="127" text-anchor="middle" font-size="14" font-weight="700"
        fill="#633806" font-family="Courier New">0.453 x [1,0] = [0.453, 0]</text>

  <!-- ===== Row 2: V("cat") with weight ===== -->
  <rect x="25" y="175" width="190" height="65" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="120" y="200" text-anchor="middle" font-size="14" font-weight="700"
        fill="#0C447C" font-family="Arial">V("cat") = [0.0, 1.0]</text>
  <text x="120" y="225" text-anchor="middle" font-size="14" fill="#0C447C"
        font-family="Arial">weight: 0.547</text>

  <!-- Arrow from V_cat to computation -->
  <line x1="215" y1="207" x2="255" y2="207" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Weighted result for "cat" -->
  <rect x="260" y="177" width="260" height="60" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="390" y="212" text-anchor="middle" font-size="14" font-weight="700"
        fill="#633806" font-family="Courier New">0.547 x [0,1] = [0, 0.547]</text>

  <!-- Plus sign between the two weighted results -->
  <text x="540" y="170" text-anchor="middle" font-size="24" font-weight="700"
        fill="#333" font-family="Arial">+</text>

  <!-- Arrow to sum result -->
  <line x1="560" y1="165" x2="595" y2="165" stroke="#1D9E75" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Sum result (green) -->
  <rect x="600" y="120" width="180" height="90" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2"/>
  <text x="690" y="152" text-anchor="middle" font-size="14" font-weight="700"
        fill="#085041" font-family="Arial">Output for "cat":</text>
  <text x="690" y="185" text-anchor="middle" font-size="16" font-weight="700"
        fill="#085041" font-family="Courier New">[0.453, 0.547]</text>

  <!-- ===== Interpretation boxes ===== -->
  <rect x="25" y="270" width="755" height="85" rx="6" fill="#F5F4F0" stroke="#D4D4D4"/>
  <text x="402" y="300" text-anchor="middle" font-size="14" font-weight="700"
        fill="#111" font-family="Arial">What This Means</text>
  <text x="402" y="328" text-anchor="middle" font-size="13" fill="#333"
        font-family="Arial">Output for "cat" is 45.3% of "The" plus 54.7% of itself — a blend of the two.</text>

  <rect x="25" y="370" width="755" height="100" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.2"/>
  <text x="402" y="398" text-anchor="middle" font-size="14" font-weight="700"
        fill="#3C3489" font-family="Arial">Before attention: "cat" had only its own embedding.</text>
  <text x="402" y="422" text-anchor="middle" font-size="13" fill="#3C3489"
        font-family="Arial">After: it carries context from "The" too.</text>
  <text x="402" y="444" text-anchor="middle" font-size="13" fill="#3C3489"
        font-family="Arial">This is how context-dependent meaning is built.</text>
</svg>