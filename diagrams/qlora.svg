<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="700"
        fill="#111" font-family="Arial">QLoRA Memory Budget: Where Every Byte Goes</text>

  <!-- Base model bar -->
  <rect x="50" y="55" width="400" height="45" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
  <text x="250" y="82" text-anchor="middle" font-size="13" font-weight="700"
        fill="#0C2E6B" font-family="Arial">Frozen Base Model (NF4): ~4 GB</text>

  <!-- LoRA adapters bar -->
  <rect x="50" y="110" width="80" height="45" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="2"/>
  <text x="90" y="137" text-anchor="middle" font-size="12" font-weight="700"
        fill="#633806" font-family="Arial">LoRA A+B</text>
  <text x="200" y="137" font-size="12" fill="#633806" font-family="Arial">~0.1 GB (bf16)</text>

  <!-- Optimizer states -->
  <rect x="50" y="165" width="50" height="45" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="2"/>
  <text x="75" y="192" text-anchor="middle" font-size="12" font-weight="700"
        fill="#3C3489" font-family="Arial">Optim</text>
  <text x="140" y="192" font-size="12" fill="#3C3489" font-family="Arial">~0.4 GB (fp32, adapters only)</text>

  <!-- Gradients -->
  <rect x="50" y="220" width="60" height="45" rx="4" fill="#D4EFE4" stroke="#0F6E56" stroke-width="2"/>
  <text x="80" y="247" text-anchor="middle" font-size="12" font-weight="700"
        fill="#04342C" font-family="Arial">Grads</text>
  <text x="150" y="247" font-size="12" fill="#04342C" font-family="Arial">~0.1 GB (adapters only)</text>

  <!-- Activations -->
  <rect x="50" y="275" width="120" height="45" rx="4" fill="#F5F4F0" stroke="#D4D4D4" stroke-width="2"/>
  <text x="110" y="302" text-anchor="middle" font-size="12" font-weight="700"
        fill="#333" font-family="Arial">Activations</text>
  <text x="210" y="302" font-size="12" fill="#333" font-family="Arial">~3-5 GB (with grad checkpointing)</text>

  <!-- Total -->
  <rect x="500" y="120" width="270" height="80" rx="8" fill="#D4EFE4" stroke="#0F6E56" stroke-width="2"/>
  <text x="635" y="150" text-anchor="middle" font-size="14" font-weight="700"
        fill="#04342C" font-family="Arial">Total: ~8-10 GB</text>
  <text x="635" y="175" text-anchor="middle" font-size="12" fill="#04342C"
        font-family="Arial">Fits on a consumer GPU!</text>

  <!-- Comparison -->
  <rect x="500" y="220" width="270" height="60" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="635" y="248" text-anchor="middle" font-size="12" font-weight="600"
        fill="#633806" font-family="Arial">Full fine-tuning: ~84 GB</text>
  <text x="635" y="268" text-anchor="middle" font-size="12" fill="#633806"
        font-family="Arial">(needs multi-GPU cluster)</text>
</svg>